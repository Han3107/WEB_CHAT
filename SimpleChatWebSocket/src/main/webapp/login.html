<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - Simple Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #6366f1;
        --secondary: #4f46e5;
        --bg-dark: #0f172a;
        --glass: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.12);
        --text-main: #f8fafc;
        --text-dim: #94a3b8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-dark);
        background-image: 
          radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-x: hidden;
      }

      .login-container {
        width: 100%;
        max-width: 440px;
        padding: 20px;
        position: relative;
        z-index: 10;
      }

      .brand {
        text-align: center;
        margin-bottom: 32px;
      }

      .brand-icon {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: white;
        margin: 0 auto 16px;
        box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
      }

      .brand h1 {
        color: var(--text-main);
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      .glass-card {
        background: var(--glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .tabs {
        display: flex;
        margin-bottom: 32px;
        background: rgba(0, 0, 0, 0.2);
        padding: 4px;
        border-radius: 12px;
      }

      .tab-btn {
        flex: 1;
        padding: 10px;
        border: none;
        background: transparent;
        color: var(--text-dim);
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      .tab-btn.active {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
      }

      .form-group {
        margin-bottom: 24px;
      }

      .form-group label {
        display: block;
        color: var(--text-dim);
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
        margin-left: 4px;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper i {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-dim);
        font-size: 16px;
      }

      .form-group input {
        width: 100%;
        padding: 14px 16px 14px 48px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: white;
        font-family: inherit;
        font-size: 15px;
        transition: all 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(0, 0, 0, 0.3);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
      }

      .btn-submit {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
      }

      .alert {
        padding: 12px 16px;
        border-radius: 12px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .alert.show { display: flex; align-items: center; gap: 10px; }
      .alert-error { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2); }
      .alert-success { background: rgba(34, 197, 94, 0.1); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.2); }
      .alert-info { background: rgba(59, 130, 246, 0.1); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.2); }

      /* Demo Access Toggle */
      .demo-toggle {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 100;
      }

      .demo-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--glass);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        color: var(--text-main);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        transition: all 0.3s ease;
      }

      .demo-btn:hover {
        background: var(--primary);
        transform: scale(1.1);
      }

      .demo-card {
        position: absolute;
        bottom: 64px;
        right: 0;
        width: 280px;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: none;
        animation: popUp 0.3s ease;
      }

      @keyframes popUp {
        from { opacity: 0; transform: scale(0.9) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      .demo-card.active { display: block; }
      .demo-title { font-size: 14px; font-weight: 700; color: white; margin-bottom: 12px; }
      .demo-list { list-style: none; }
      .demo-item { 
        padding: 8px 10px;
        background: rgba(255,255,255,0.05);
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        cursor: pointer;
        transition: 0.2s;
      }
      .demo-item:hover { background: rgba(99, 102, 241, 0.2); }
      .role-badge { 
        padding: 2px 6px; 
        border-radius: 4px; 
        font-size: 10px; 
        font-weight: 800; 
        text-transform: uppercase;
      }

      @media (max-width: 480px) {
        .login-container { padding: 15px; }
        .glass-card { padding: 30px 20px; }
      }
    </style>
  </head>
  <body>
    <!-- Background Orbs for extra flair -->
    <div style="position:fixed; top: -10%; left: -10%; width: 40%; height: 40%; background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%); pointer-events:none;"></div>
    
    <div class="login-container">
      <div class="brand">
        <div class="brand-icon">
          <i class="fas fa-comment-dots"></i>
        </div>
        <h1>Simple Chat</h1>
      </div>

      <div class="glass-card">
        <div class="tabs">
          <button id="loginTab" class="tab-btn active" onclick="switchTab('login')">Đăng Nhập</button>
          <button id="signupTab" class="tab-btn" onclick="switchTab('signup')">Đăng Ký</button>
        </div>

        <div id="loginAlert" class="alert"></div>

        <!-- Login Form -->
        <div id="loginForm-container">
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label>TÊN ĐĂNG NHẬP</label>
              <div class="input-wrapper">
                <i class="far fa-user"></i>
                <input type="text" id="login-username" placeholder="Nhập tên đăng nhập" required>
              </div>
            </div>

            <div class="form-group">
              <label>MẬT KHẨU</label>
              <div class="input-wrapper">
                <i class="fas fa-fingerprint"></i>
                <input type="password" id="login-password" placeholder="••••••••" required>
              </div>
            </div>

            <button type="submit" class="btn-submit">
              Xác Nhận <i class="fas fa-arrow-right" style="font-size: 12px; margin-left: 8px"></i>
            </button>
          </form>
        </div>

        <!-- Signup Form -->
        <div id="signupForm-container" style="display: none">
          <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
              <label>HỌ & TÊN</label>
              <div class="input-wrapper">
                <i class="far fa-id-card"></i>
                <input type="text" id="signup-fullname" placeholder="Nguyễn Văn A" required>
              </div>
            </div>

            <div class="form-group">
              <label>EMAIL</label>
              <div class="input-wrapper">
                <i class="far fa-envelope"></i>
                <input type="email" id="signup-email" placeholder="example@email.com" required>
              </div>
            </div>

            <div class="form-group">
              <label>TÊN ĐĂNG NHẬP</label>
              <div class="input-wrapper">
                <i class="far fa-user"></i>
                <input type="text" id="signup-username" placeholder="username123" required>
              </div>
            </div>

            <div class="form-group">
              <label>MẬT KHẨU</label>
              <div class="input-wrapper">
                <i class="fas fa-fingerprint"></i>
                <input type="password" id="signup-password" placeholder="Tối thiểu 6 ký tự" minlength="6" required>
              </div>
            </div>

             <div class="form-group">
              <label>XÁC NHẬN MẬT KHẨU</label>
              <div class="input-wrapper">
                <i class="fas fa-shield-alt"></i>
                <input type="password" id="signup-confirm-password" placeholder="••••••••" required>
              </div>
            </div>

            <button type="submit" class="btn-submit">Bắt Đầu Ngay</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Demo Access Floating Toggle -->
    <div class="demo-toggle">
      <button class="demo-btn" onclick="toggleDemoCard()" title="Tài khoản Demo">
        <i class="fas fa-key"></i>
      </button>
      <div id="demoCard" class="demo-card">
        <div class="demo-title">🔑 Tài khoản Demo</div>
        <div class="demo-list">
          <div class="demo-item" onclick="fillDemo('admin', 'admin123')">
            <span>admin</span>
            <span class="role-badge" style="background:#ef4444">Admin</span>
          </div>
          <div class="demo-item" onclick="fillDemo('user1', 'user123')">
            <span>user1</span>
            <span class="role-badge" style="background:#3b82f6">User</span>
          </div>
          <div class="demo-item" onclick="fillDemo('mod1', 'mod123')">
            <span>mod1</span>
            <span class="role-badge" style="background:#f59e0b">Mod</span>
          </div>
        </div>
        <div style="font-size: 10px; color: var(--text-dim); margin-top: 10px; text-align: center">
          Nhấn để tự điền thông tin
        </div>
      </div>
    </div>

    <script>
      function toggleDemoCard() {
        document.getElementById("demoCard").classList.toggle("active");
      }

      function fillDemo(username, password) {
        switchTab('login');
        document.getElementById("login-username").value = username;
        document.getElementById("login-password").value = password;
        toggleDemoCard();
      }

      function switchTab(tabName) {
        document.getElementById("loginForm-container").style.display = tabName === "login" ? "block" : "none";
        document.getElementById("signupForm-container").style.display = tabName === "signup" ? "block" : "none";
        
        document.getElementById("loginTab").classList.toggle("active", tabName === "login");
        document.getElementById("signupTab").classList.toggle("active", tabName === "signup");
        
        document.getElementById("loginAlert").className = "alert";
      }

      async function handleSignup(e) {
        e.preventDefault();
        const fullName = document.getElementById("signup-fullname").value.trim();
        const email = document.getElementById("signup-email").value.trim();
        const username = document.getElementById("signup-username").value.trim();
        const password = document.getElementById("signup-password").value;
        const confirmPassword = document.getElementById("signup-confirm-password").value;
        const alert = document.getElementById("loginAlert");

        if (password !== confirmPassword) {
          showAlert("Mật khẩu xác nhận không khớp", "error");
          return;
        }

        try {
          showAlert("Đang đăng ký...", "info");
          const response = await fetch("./api/auth/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password, email, fullName }),
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.message || "Đăng ký thất bại");

          showAlert(data.message, "success");
          document.getElementById("signupForm").reset();
          setTimeout(() => switchTab("login"), 2000);
        } catch (err) {
          showAlert(err.message, "error");
        }
      }

      async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById("login-username").value.trim();
        const password = document.getElementById("login-password").value;
        const alert = document.getElementById("loginAlert");

        try {
          showAlert("Đang xác thực...", "info");

          const response = await fetch("./api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.message || "Thông tin đăng nhập không chính xác");
          }

          const data = await response.json();
          showAlert("Đăng nhập thành công!", "success");

          localStorage.setItem("token", data.token);
          localStorage.setItem("username", data.username);
          localStorage.setItem("role", data.role);

          setTimeout(() => {
            window.location.replace(data.role === "admin" ? "admin-dashboard.html" : "chat.html");
          }, 800);
        } catch (err) {
          showAlert(err.message, "error");
        }
      }

      function showAlert(msg, type) {
        const alert = document.getElementById("loginAlert");
        alert.className = `alert alert-${type} show`;
        const icon = type === "error" ? "exclamation-circle" : (type === "success" ? "check-circle" : "spinner fa-spin");
        alert.innerHTML = `<i class="fas fa-${icon}"></i> <span>${msg}</span>`;
      }
    </script>
  </body>
</html>
