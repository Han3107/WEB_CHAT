<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - Simple Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #6c63ff;
        --secondary: #5a52d5;
        --bg-light: #f8f9ff;
        --card-bg: #ffffff;
        --text-main: #2d3436;
        --text-dim: #636e72;
        --shadow-soft: 0 25px 50px -12px rgba(108, 99, 255, 0.15), 0 10px 20px -5px rgba(0, 0, 0, 0.05);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-y: auto;
        overflow-x: hidden;
        position: relative;
        padding: 40px 20px;
      }

      .bg-blob {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        filter: blur(100px);
        z-index: 0;
        pointer-events: none;
        opacity: 0.4;
      }

      .blob-1 {
        top: -200px;
        left: -150px;
        background: #e0e7ff;
      }

      .blob-2 {
        bottom: -200px;
        right: -150px;
        background: #f5f3ff;
      }

      .login-container {
        width: 100%;
        max-width: 440px;
        padding: 20px;
        position: relative;
        z-index: 10;
      }

      .brand {
        text-align: center;
        margin-bottom: 24px;
      }

      .brand-icon {
        width: 42px;
        height: 42px;
        background: var(--primary);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: white;
        margin: 0 auto 10px;
        box-shadow: 0 4px 12px rgba(108, 99, 255, 0.15);
      }

      .brand h1 {
        color: var(--text-main);
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 2px;
      }

      .brand-subtitle {
        color: var(--text-dim);
        font-size: 11px;
        font-weight: 500;
        opacity: 0.7;
      }

      .glass-card {
        background: var(--card-bg);
        border: 1px solid rgba(108, 99, 255, 0.1);
        border-top: 4px solid var(--primary);
        border-radius: 20px;
        padding: 32px 32px 24px;
        box-shadow: var(--shadow-soft);
      }

      .tabs {
        display: flex;
        margin-bottom: 24px;
        background: #f1f3f9;
        padding: 4px;
        border-radius: 10px;
      }

      .tab-btn {
        flex: 1;
        padding: 10px;
        border: none;
        background: transparent;
        color: #8c98a5;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      .tab-btn.active {
        background: white;
        color: var(--primary);
        box-shadow: 0 4px 12px rgba(108, 99, 255, 0.15);
        border: 1px solid rgba(108, 99, 255, 0.1);
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-group label {
        display: block;
        color: var(--text-dim);
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
        margin-left: 4px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .input-wrapper {
        position: relative;
      }

      .input-wrapper i {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: #8b85d4;
        font-size: 16px;
      }

      .form-group input {
        width: 100%;
        padding: 14px 16px 14px 48px;
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        color: var(--text-main);
        font-family: inherit;
        font-size: 15px;
        transition: all 0.3s ease;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
      }

      .btn-submit {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #7c6ff7 0%, #5a4bcd 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        margin-top: 12px;
        box-shadow: 0 10px 20px -5px rgba(108, 99, 255, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .btn-submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 25px -5px rgba(108, 99, 255, 0.5);
        background: linear-gradient(135deg, #8a7ff9 0%, #6c5ce7 100%);
      }

      .btn-submit:active {
        transform: translateY(-1px);
        box-shadow: 0 5px 15px -5px rgba(108, 99, 255, 0.4);
      }

      .btn-submit i {
        transition: transform 0.3s ease;
      }

      .btn-submit:hover i {
        transform: translateX(4px);
      }

      .alert {
        padding: 12px 16px;
        border-radius: 12px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Professional Polish Extras */
      .forgot-password {
        display: block;
        text-align: right;
        font-size: 12px;
        color: var(--primary);
        text-decoration: none;
        margin-top: -16px;
        margin-bottom: 24px;
        font-weight: 500;
        transition: opacity 0.2s;
      }
      .forgot-password:hover { opacity: 0.8; }

      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 20px 0;
        color: var(--text-dim);
        font-size: 11px;
        font-weight: 700;
        opacity: 0.6;
      }
      .divider::before, .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #e1e5f2;
      }
      .divider span { padding: 0 15px; }

      .social-login {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
      }
      .social-btn {
        flex: 1;
        padding: 12px;
        border: 1px solid #e1e5f2;
        border-radius: 12px;
        background: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-main);
        transition: all 0.3s ease;
      }
      .social-btn:hover {
        background: #f8f9ff;
        border-color: var(--primary);
        transform: translateY(-2px);
      }
      .social-btn i { font-size: 18px; }
      .fa-google { color: #ea4335; }
      .fa-facebook { color: #1877f2; }

      .login-footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #f1f3f9;
        color: var(--text-dim);
        font-size: 10px;
        display: flex;
        justify-content: center;
        gap: 15px;
      }
      .login-footer a { color: var(--text-dim); text-decoration: none; transition: 0.2s; }
      .login-footer a:hover { color: var(--primary); }

      /* Demo Access Toggle */
      .demo-toggle {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 100;
      }

      .demo-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--glass);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        color: var(--text-main);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        transition: all 0.3s ease;
      }

      .demo-btn:hover {
        background: var(--primary);
        transform: scale(1.1);
      }

      .demo-card {
        position: absolute;
        bottom: 64px;
        right: 0;
        width: 280px;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: none;
        animation: popUp 0.3s ease;
      }

      @keyframes popUp {
        from { opacity: 0; transform: scale(0.9) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      .demo-card.active { display: block; }
      .demo-title { font-size: 14px; font-weight: 700; color: white; margin-bottom: 12px; }
      .demo-list { list-style: none; }
      .demo-item { 
        padding: 8px 10px;
        background: rgba(255,255,255,0.05);
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        cursor: pointer;
        transition: 0.2s;
      }
      .demo-item:hover { background: rgba(99, 102, 241, 0.2); }
      .role-badge { 
        padding: 2px 6px; 
        border-radius: 4px; 
        font-size: 10px; 
        font-weight: 800; 
        text-transform: uppercase;
      }

      @media (max-width: 480px) {
        .login-container { padding: 15px; }
        .glass-card { padding: 30px 20px; }
      }
    </style>
  </head>
  <body>
    <!-- Background Accents -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    
    <div class="login-container">
      <div class="glass-card">
        <div class="brand">
          <div class="brand-icon">
            <i class="fas fa-comment-dots"></i>
          </div>
          <h1>Simple Chat</h1>
          <p class="brand-subtitle">Kết nối mọi lúc, mọi nơi</p>
        </div>

        <div class="tabs">
          <button id="loginTab" class="tab-btn active" onclick="switchTab('login')">Đăng Nhập</button>
          <button id="signupTab" class="tab-btn" onclick="switchTab('signup')">Đăng Ký</button>
        </div>

        <div id="loginAlert" class="alert"></div>

        <!-- Login Form -->
        <div id="loginForm-container">
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label>TÊN ĐĂNG NHẬP</label>
              <div class="input-wrapper">
                <i class="far fa-user"></i>
                <input type="text" id="login-username" placeholder="Nhập tên đăng nhập" required>
              </div>
            </div>

            <div class="form-group">
              <label>MẬT KHẨU</label>
              <div class="input-wrapper">
                <i class="fas fa-fingerprint"></i>
                <input type="password" id="login-password" placeholder="••••••••" required>
              </div>
            </div>

            <a href="#" class="forgot-password">Quên mật khẩu?</a>

            <button type="submit" class="btn-submit">
              Xác Nhận <i class="fas fa-arrow-right" style="font-size: 12px; margin-left: 8px"></i>
            </button>
          </form>

          <div class="divider">
            <span>HOẶC TIẾP TỤC VỚI</span>
          </div>

          <div class="social-login">
            <button class="social-btn">
              <i class="fab fa-google"></i> Google
            </button>
            <button class="social-btn">
              <i class="fab fa-facebook"></i> Facebook
            </button>
          </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm-container" style="display: none">
          <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
              <label>HỌ & TÊN</label>
              <div class="input-wrapper">
                <i class="far fa-id-card"></i>
                <input type="text" id="signup-fullname" placeholder="Nguyễn Văn A" required>
              </div>
            </div>

            <div class="form-group">
              <label>EMAIL</label>
              <div class="input-wrapper">
                <i class="far fa-envelope"></i>
                <input type="email" id="signup-email" placeholder="example@email.com" required>
              </div>
            </div>

            <div class="form-group">
              <label>TÊN ĐĂNG NHẬP</label>
              <div class="input-wrapper">
                <i class="far fa-user"></i>
                <input type="text" id="signup-username" placeholder="username123" required>
              </div>
            </div>

            <div class="form-group">
              <label>MẬT KHẨU</label>
              <div class="input-wrapper">
                <i class="fas fa-fingerprint"></i>
                <input type="password" id="signup-password" placeholder="Tối thiểu 6 ký tự" minlength="6" required>
              </div>
            </div>

             <div class="form-group">
              <label>XÁC NHẬN MẬT KHẨU</label>
              <div class="input-wrapper">
                <i class="fas fa-shield-alt"></i>
                <input type="password" id="signup-confirm-password" placeholder="••••••••" required>
              </div>
            </div>

            <button type="submit" class="btn-submit">Bắt Đầu Ngay</button>
          </form>
        </div>

        <div class="login-footer">
          <a href="#">Bản quyền © 2026</a>
          <a href="#">Chính sách bảo mật</a>
          <a href="#">Điều khoản sử dụng</a>
        </div>
      </div>
    </div>

    <!-- Demo Access Floating Toggle -->
    <div class="demo-toggle">
      <button class="demo-btn" onclick="toggleDemoCard()" title="Tài khoản Demo">
        <i class="fas fa-key"></i>
      </button>
      <div id="demoCard" class="demo-card">
        <div class="demo-title">🔑 Tài khoản Demo</div>
        <div class="demo-list">
          <div class="demo-item" onclick="fillDemo('admin', 'admin123')">
            <span>admin</span>
            <span class="role-badge" style="background:#ef4444">Admin</span>
          </div>
          <div class="demo-item" onclick="fillDemo('user1', 'user123')">
            <span>user1</span>
            <span class="role-badge" style="background:#3b82f6">User</span>
          </div>
          <div class="demo-item" onclick="fillDemo('mod1', 'mod123')">
            <span>mod1</span>
            <span class="role-badge" style="background:#f59e0b">Mod</span>
          </div>
        </div>
        <div style="font-size: 10px; color: var(--text-dim); margin-top: 10px; text-align: center">
          Nhấn để tự điền thông tin
        </div>
      </div>
    </div>

    <script>
      function toggleDemoCard() {
        document.getElementById("demoCard").classList.toggle("active");
      }

      function fillDemo(username, password) {
        switchTab('login');
        document.getElementById("login-username").value = username;
        document.getElementById("login-password").value = password;
        toggleDemoCard();
      }

      function switchTab(tabName) {
        document.getElementById("loginForm-container").style.display = tabName === "login" ? "block" : "none";
        document.getElementById("signupForm-container").style.display = tabName === "signup" ? "block" : "none";
        
        document.getElementById("loginTab").classList.toggle("active", tabName === "login");
        document.getElementById("signupTab").classList.toggle("active", tabName === "signup");
        
        document.getElementById("loginAlert").className = "alert";
      }

      async function handleSignup(e) {
        e.preventDefault();
        const fullName = document.getElementById("signup-fullname").value.trim();
        const email = document.getElementById("signup-email").value.trim();
        const username = document.getElementById("signup-username").value.trim();
        const password = document.getElementById("signup-password").value;
        const confirmPassword = document.getElementById("signup-confirm-password").value;
        const alert = document.getElementById("loginAlert");

        if (password !== confirmPassword) {
          showAlert("Mật khẩu xác nhận không khớp", "error");
          return;
        }

        try {
          showAlert("Đang đăng ký...", "info");
          const response = await fetch("./api/auth/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password, email, fullName }),
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.message || "Đăng ký thất bại");

          showAlert(data.message, "success");
          document.getElementById("signupForm").reset();
          setTimeout(() => switchTab("login"), 2000);
        } catch (err) {
          showAlert(err.message, "error");
        }
      }

      async function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById("login-username").value.trim();
        const password = document.getElementById("login-password").value;
        const alert = document.getElementById("loginAlert");

        try {
          showAlert("Đang xác thực...", "info");

          const response = await fetch("./api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.message || "Thông tin đăng nhập không chính xác");
          }

          const data = await response.json();
          showAlert("Đăng nhập thành công!", "success");

          localStorage.setItem("token", data.token);
          localStorage.setItem("username", data.username);
          localStorage.setItem("role", data.role);

          setTimeout(() => {
            window.location.replace(data.role === "admin" ? "admin-dashboard.html" : "chat.html");
          }, 800);
        } catch (err) {
          showAlert(err.message, "error");
        }
      }

      function showAlert(msg, type) {
        const alert = document.getElementById("loginAlert");
        alert.className = `alert alert-${type} show`;
        const icon = type === "error" ? "exclamation-circle" : (type === "success" ? "check-circle" : "spinner fa-spin");
        alert.innerHTML = `<i class="fas fa-${icon}"></i> <span>${msg}</span>`;
      }
    </script>
  </body>
</html>
