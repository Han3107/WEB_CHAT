<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💬 Simple Chat - WebSocket</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px;
      }

      .container {
        width: 100%;
        max-width: 600px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 90vh;
        max-height: 600px;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        text-align: center;
      }

      .header h1 {
        font-size: 24px;
        margin-bottom: 10px;
      }

      .status {
        font-size: 12px;
        opacity: 0.9;
      }

      .login-form {
        display: none;
        padding: 20px;
        background: #f5f5f5;
        border-bottom: 1px solid #ddd;
      }

      .login-form.active {
        display: flex;
        gap: 10px;
      }

      .login-form input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
      }

      .login-form button {
        padding: 10px 20px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s;
      }

      .login-form button:hover {
        background: #764ba2;
      }

      .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: white;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .message {
        padding: 10px 15px;
        border-radius: 10px;
        max-width: 80%;
        word-wrap: break-word;
        font-size: 14px;
      }

      .message.user {
        align-self: flex-end;
        background: #667eea;
        color: white;
      }

      .message.system {
        align-self: center;
        background: #f0f0f0;
        color: #666;
        font-size: 12px;
        font-style: italic;
      }

      .message.other {
        align-self: flex-start;
        background: #e0e0e0;
        color: #333;
      }

      .message .username {
        font-weight: bold;
        font-size: 12px;
        margin-bottom: 3px;
        opacity: 0.8;
      }

      .message .time {
        font-size: 11px;
        opacity: 0.7;
        margin-top: 3px;
      }

      .input-area {
        display: flex;
        gap: 10px;
        padding: 15px;
        background: #f5f5f5;
        border-top: 1px solid #ddd;
      }

      .input-area input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
      }

      .input-area button {
        padding: 10px 20px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s;
      }

      .input-area button:hover {
        background: #764ba2;
      }

      .input-area button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .user-list {
        padding: 10px 15px;
        background: #f9f9f9;
        border-top: 1px solid #ddd;
        font-size: 12px;
        color: #666;
      }

      .user-list strong {
        color: #667eea;
      }

      .disconnect-btn {
        padding: 5px 10px;
        background: #ff6b6b;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
        margin-left: 10px;
      }

      .disconnect-btn:hover {
        background: #ff5252;
      }

      @media (max-width: 600px) {
        .container {
          max-height: none;
          height: calc(100vh - 20px);
        }

        .message {
          max-width: 95%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>💬 Simple Chat WebSocket</h1>
        <div class="status" id="status">Đang kết nối...</div>
      </div>

      <div class="login-form active" id="loginForm">
        <input
          type="text"
          id="usernameInput"
          placeholder="Nhập tên của bạn..."
          maxlength="20"
        />
        <button onclick="login()">Tham gia</button>
      </div>

      <div class="chat-box" id="chatBox"></div>

      <div class="user-list" id="userList">
        👥 Online: <span id="userCount">0</span>
      </div>

      <div class="input-area" id="inputArea" style="display: none">
        <input
          type="text"
          id="messageInput"
          placeholder="Nhập tin nhắn..."
          maxlength="500"
        />
        <button onclick="sendMessage()">Gửi</button>
        <button class="disconnect-btn" onclick="disconnect()">Thoát</button>
      </div>
    </div>

    <script>
      let ws = null;
      let username = null;
      let isConnected = false;
      let reconnectTimer = null;
      let reconnectAttempts = 0;
      const maxReconnectAttempts = 8;
      let manualDisconnect = false;

      // Kết nối WebSocket
      function connectWebSocket() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          return;
        }

        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const host = window.location.host;

        // Tìm base path từ URL hiện tại
        // Nếu chạy ở http://localhost:8080/ => /chat
        // Nếu chạy ở http://localhost:8080/SimpleChatWebSocket => /SimpleChatWebSocket/chat
        let basePath = window.location.pathname;
        if (basePath === "/" || basePath === "") {
          basePath = "";
        } else {
          basePath = basePath.replace(/\/$/, ""); // Remove trailing slash
        }

        const wsUrl = protocol + "//" + host + basePath + "/chat";
        console.log("=== WebSocket Connection Debug ===");
        console.log("Protocol:", protocol);
        console.log("Host:", host);
        console.log("Base Path:", basePath);
        console.log("Full URL:", wsUrl);
        console.log("==================================");

        ws = new WebSocket(wsUrl);

        ws.onopen = function () {
          console.log("WebSocket connected");
          document.getElementById("status").textContent = "✓ Đã kết nối";
          isConnected = true;
          reconnectAttempts = 0;

          if (username) {
            ws.send(
              JSON.stringify({
                type: "login",
                username: username,
              }),
            );
          }
        };

        ws.onmessage = function (event) {
          handleMessage(JSON.parse(event.data));
        };

        ws.onerror = function (error) {
          console.error("WebSocket error:", error);
          document.getElementById("status").textContent = "✗ Lỗi kết nối";
          isConnected = false;
        };

        ws.onclose = function () {
          console.log("WebSocket closed");
          document.getElementById("status").textContent = "✗ Đã ngắt kết nối";
          isConnected = false;

          if (!manualDisconnect) {
            scheduleReconnect();
            return;
          }

          document.getElementById("loginForm").classList.add("active");
          document.getElementById("inputArea").style.display = "none";
        };
      }

      function scheduleReconnect() {
        if (reconnectAttempts >= maxReconnectAttempts) {
          document.getElementById("status").textContent =
            "✗ Mất kết nối server";
          return;
        }

        reconnectAttempts += 1;
        const delay = Math.min(1000 * reconnectAttempts, 5000);
        document.getElementById("status").textContent =
          "Đang thử kết nối lại... (" +
          reconnectAttempts +
          "/" +
          maxReconnectAttempts +
          ")";

        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(function () {
          connectWebSocket();
        }, delay);
      }

      // Xử lý tin nhắn từ server
      function handleMessage(data) {
        const chatBox = document.getElementById("chatBox");
        const messageDiv = document.createElement("div");
        messageDiv.className = "message";

        if (data.type === "message") {
          messageDiv.classList.add(
            data.username === username ? "user" : "other",
          );
          messageDiv.innerHTML = `
                    <div class="username">${data.username}</div>
                    <div>${escapeHtml(data.content)}</div>
                    <div class="time">${data.time}</div>
                `;
        } else if (data.type === "system") {
          messageDiv.classList.add("system");
          messageDiv.innerHTML = `>>> ${data.content}`;
        } else if (data.type === "userlist") {
          document.getElementById("userList").innerHTML =
            `👥 Online (${data.count}): ${data.users}`;
          return;
        }

        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      // Login
      function login() {
        const input = document.getElementById("usernameInput");
        const name = input.value.trim();

        if (!name) {
          alert("Vui lòng nhập tên");
          return;
        }

        if (!isConnected) {
          alert("Chưa kết nối server");
          return;
        }

        username = name;
        manualDisconnect = false;

        ws.send(
          JSON.stringify({
            type: "login",
            username: name,
          }),
        );

        document.getElementById("loginForm").classList.remove("active");
        document.getElementById("inputArea").style.display = "flex";
        document.getElementById("messageInput").focus();
      }

      // Gửi tin nhắn
      function sendMessage() {
        const input = document.getElementById("messageInput");
        const content = input.value.trim();

        if (!content) return;
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          alert("Mất kết nối server, vui lòng chờ reconnect");
          return;
        }

        ws.send(
          JSON.stringify({
            type: "message",
            content: content,
          }),
        );

        input.value = "";
        input.focus();
      }

      // Thoát
      function disconnect() {
        manualDisconnect = true;
        clearTimeout(reconnectTimer);

        if (ws) {
          ws.close();
        }
        username = null;
        document.getElementById("chatBox").innerHTML = "";
      }

      // Escape HTML
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Enter để gửi
      document.addEventListener("DOMContentLoaded", function () {
        document
          .getElementById("messageInput")
          .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              sendMessage();
            }
          });

        document
          .getElementById("usernameInput")
          .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              login();
            }
          });

        connectWebSocket();
      });
    </script>
  </body>
</html>
