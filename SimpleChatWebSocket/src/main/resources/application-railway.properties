# Railway Deployment Configuration (PostgreSQL)
server.port=${PORT:8080}
# Database Configuration
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Tables already created via database_postgresql.sql, just validate
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never

# Logging
logging.level.root=INFO
logging.level.com.simplechat=DEBUG

# Context Path for Railway (usually root is better, but keeping for compatibility)
server.servlet.context-path=/SimpleChatWebSocket
