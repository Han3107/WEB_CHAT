# Server Configuration
server.port=8080
server.servlet.context-path=/SimpleChatWebSocket

# Database Configuration - SQL Server with SA User
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=simplechat;encrypt=false;trustServerCertificate=true;loginTimeout=15;
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.sql.init.SqlInitializationAutoConfiguration

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.simplechat=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch.size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging
logging.level.root=WARN
logging.level.com.simplechat=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
